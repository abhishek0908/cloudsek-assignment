version: "3.9"

services:
  api:
    build: .
    container_name: metadata_api
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://mongo:27017
      DATABASE_NAME: metadata_inventory
      REQUEST_TIMEOUT: "10"
      APP_NAME: HTTP Metadata Inventory
      APP_VERSION: 1.0.0
      ENVIRONMENT: development
      LOG_LEVEL: INFO
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    container_name: metadata_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  mongo_data:
